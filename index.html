<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plata · Тренажёр</title>
<style>
  :root{
    --bg:#0f1115; --card:#1b1f27; --card2:#232834; --line:#2e3543;
    --txt:#e8ebf0; --muted:#9aa3b2; --green:#58cc02; --green-d:#46a302;
    --red:#ff4b4b; --blue:#1cb0f6; --gold:#ffc800; --purple:#ce82ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;
    align-items:center;-webkit-text-size-adjust:100%}
  header{width:100%;max-width:680px;padding:14px 18px 6px;display:flex;align-items:center;gap:12px}
  .logo{font-weight:800;font-size:17px;letter-spacing:.5px}
  .logo span{color:var(--green)}
  .stat{margin-left:auto;display:flex;gap:14px;align-items:center;font-weight:700;font-size:15px}
  .stat .s{display:flex;align-items:center;gap:5px}
  .bar{width:100%;max-width:680px;padding:0 18px}
  .track{height:12px;background:var(--card2);border-radius:10px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--green);border-radius:10px;transition:width .35s}
  .tabs{display:flex;gap:8px;max-width:680px;width:100%;padding:12px 18px}
  .tab{flex:1;padding:11px 4px;border-radius:12px;background:var(--card);border:2px solid var(--line);
    color:var(--muted);font-weight:700;cursor:pointer;text-align:center;font-size:14px;user-select:none}
  .tab.active{color:var(--txt);border-color:var(--green);background:var(--card2)}
  main{width:100%;max-width:680px;padding:6px 18px 48px;flex:1}

  .blocktag{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
  .b-risk{background:#3a1f24;color:#ff8a8a}
  .b-prof{background:#1f2f24;color:#7ee08a}
  .b-unit{background:#23283a;color:#9db4ff}
  .b-data{background:#2c2440;color:var(--purple)}
  .b-prod{background:#3a2a1c;color:#ffb86b}
  .topline{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .counter{margin-left:auto;font-size:13px;color:var(--muted);font-weight:700}

  .panel{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:22px}
  .term{font-size:26px;font-weight:800;line-height:1.2;margin:2px 0 8px}
  .prompt{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:18px}
  .answer{display:none}
  .answer.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .row{margin-bottom:14px}
  .row .lab{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:4px}
  .row .val{font-size:15.5px;line-height:1.5}
  .formula{background:#0c1622;border:1px solid #143049;color:#9fe0ff;border-radius:10px;
    padding:8px 12px;font-family:ui-monospace,Menlo,monospace;font-size:14px;display:inline-block;line-height:1.5}
  .gotcha .val{color:var(--gold)}

  .btn{width:100%;padding:15px;border:none;border-radius:16px;font-weight:800;font-size:16px;cursor:pointer;color:#fff}
  .btn-green{background:var(--green);box-shadow:0 4px 0 var(--green-d)}
  .btn-green:active{transform:translateY(2px);box-shadow:0 2px 0 var(--green-d)}
  .btn-ghost{background:transparent;border:2px solid var(--line);color:var(--muted)}
  .mt{margin-top:14px}

  .rate{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
  .rbtn{padding:13px 4px;border:none;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer;color:#fff}
  .r-again{background:var(--red)} .r-hard{background:#e6a700} .r-good{background:var(--blue)} .r-easy{background:var(--green)}
  .rbtn small{display:block;font-size:10px;font-weight:600;opacity:.85;margin-top:2px}

  .q{font-size:19px;font-weight:700;line-height:1.4;margin:4px 0 18px}
  .opt{width:100%;text-align:left;padding:15px;margin-bottom:10px;border-radius:14px;
    background:var(--card);border:2px solid var(--line);color:var(--txt);font-size:15px;font-weight:600;
    cursor:pointer;line-height:1.4}
  .opt.correct{border-color:var(--green);background:#16291a}
  .opt.wrong{border-color:var(--red);background:#2a1618}
  .opt:disabled{cursor:default}
  .feedback{font-weight:800;margin:14px 2px 10px;font-size:15px}
  .ok{color:var(--green)} .no{color:var(--red)}
  .explain{background:var(--card2);border-radius:12px;padding:14px;font-size:14px;line-height:1.55;color:var(--muted);margin-bottom:14px}
  .explain b{color:var(--txt)}

  .done{text-align:center;padding:42px 8px}
  .done .big{font-size:54px;margin-bottom:6px}
  .done h2{font-size:24px;margin:6px 0}
  .done p{color:var(--muted);font-size:15px;line-height:1.6}
  .scoreline{display:flex;justify-content:center;gap:26px;margin:22px 0}
  .scoreline .v{font-size:30px;font-weight:800}
  .scoreline .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .casehint{background:var(--card2);border-radius:12px;padding:14px 16px;font-size:13.5px;
    line-height:1.55;color:var(--muted);margin-bottom:16px}
  .casehint b{color:var(--txt)}
  .case{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
  .case h3{font-size:17px;margin:0 0 8px}
  .case .scn{font-size:14.5px;line-height:1.5;color:#d7dce4;margin-bottom:12px}
  .case ol{margin:12px 0 0;padding-left:20px}
  .case li{font-size:14px;line-height:1.5;margin-bottom:7px;color:#d7dce4}
  .case li b{color:var(--txt)}
  .reset{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:12px;margin-top:26px}
  .smallnote{font-size:12px;color:var(--muted);text-align:center;margin-top:16px}
</style>
</head>
<body>
<header>
  <div class="logo">Plata<span>·</span>тренажёр</div>
  <div class="stat">
    <div class="s" title="Стрик дней">🔥<span id="streak">0</span></div>
    <div class="s" title="Освоено карт">⭐<span id="mastered">0</span></div>
  </div>
</header>
<div class="bar"><div class="track"><div class="fill" id="fill"></div></div></div>
<div class="tabs">
  <div class="tab active" data-mode="learn">Карточки</div>
  <div class="tab" data-mode="quiz">Квиз</div>
  <div class="tab" data-mode="cases">Кейсы</div>
</div>
<main id="app"></main>

<script>
/* ===================== ДАННЫЕ: метрики ===================== */
const CARDS = [
  // ---- РИСК (ядро бизнеса Plata) ----
  {id:'cor',term:'Cost of Risk (CoR)',block:'risk',
   meaning:'Во сколько обходится кредитный риск — сколько резервов банк начисляет на портфель за период. Для лендера это метрика №1.',
   formula:'Начисленные резервы / Средний кредитный портфель',
   who:'Менеджмент, риск, Finance, борд — напрямую режет прибыль.',
   gotcha:'Рост CoR при росте портфеля нормален; тревога — когда растёт быстрее портфеля или хуже плана. Связан с IFRS 9 ECL.'},
  {id:'npl',term:'NPL ratio',block:'risk',
   meaning:'Какая часть портфеля «плохая» — обычно просрочка 90+ дней.',
   formula:'Портфель с просрочкой 90+ dpd / Общий портфель',
   who:'Риск, Finance, регулятор CNBV.',
   gotcha:'Можно занизить списаниями/продажей плохих долгов — смотри вместе с NCO.'},
  {id:'cov',term:'Coverage ratio',block:'risk',
   meaning:'Насколько резервы покрывают плохие кредиты — «подушка» на случай потерь.',
   formula:'Резервы / NPL (плохие кредиты)',
   who:'Риск, регулятор, инвесторы.',
   gotcha:'>100% = консервативно (перепокрыто), <100% = риск недорезерва.'},
  {id:'nco',term:'NCO — Net Charge-Off',block:'risk',
   meaning:'Сколько долга реально списали как безнадёжный, за вычетом возвратов. Это уже фактические потери (NPL — ещё нет).',
   formula:'(Списания − Возвраты) / Средний портфель',
   who:'Риск, Finance.',
   gotcha:'У карт NCO исторически высокий (~4–4.5%): кредит необеспеченный.'},
  {id:'ecl',term:'ECL = PD × LGD × EAD',block:'risk',
   meaning:'Ожидаемые кредитные потери (IFRS 9). PD — вероятность дефолта, LGD — доля потерь при дефолте, EAD — сумма под риском.',
   formula:'ECL = PD × LGD × EAD',
   who:'Риск, Finance (расчёт резервов), регулятор.',
   gotcha:'3 стадии: Stage 1 (12-мес ECL) → Stage 2 (lifetime, риск вырос) → Stage 3 (дефолт). Для карт LGD высокий.'},
  {id:'roll',term:'Vintage / Roll rate',block:'risk',
   meaning:'Vintage — как когорта выдач одного месяца портится со временем. Roll rate — вероятность перетечь в худшую корзину просрочки.',
   formula:'Roll rate = баланс, ушедший в худшую корзину / баланс в исходной корзине',
   who:'Риск, скоринг — раннее предупреждение качества портфеля.',
   gotcha:'Прогнозирует потери ДО того, как кредит станет NPL.'},
  {id:'dpd',term:'DPD / корзины просрочки',block:'risk',
   meaning:'Days Past Due — сколько дней клиент не платит. Портфель делят на корзины: 1–29, 30–59, 60–89, 90+ дней.',
   formula:'DPD = число дней с пропущенного платежа',
   who:'Риск, коллекшн, Finance.',
   gotcha:'90+ dpd обычно = дефолт/NPL и Stage 3 по IFRS 9.'},
  {id:'car',term:'CAR — Capital Adequacy Ratio',block:'risk',
   meaning:'Достаточность капитала: сколько собственного капитала банк держит против взвешенных по риску активов.',
   formula:'Капитал / Активы, взвешенные по риску (RWA)',
   who:'Регулятор (CNBV/Banxico), риск, борд.',
   gotcha:'Минимум задаёт регулятор (Базель). Для быстрорастущего банка капитал — ограничитель роста портфеля.'},
  {id:'ldr',term:'LDR — Loan-to-Deposit ratio',block:'risk',
   meaning:'Сколько кредитов выдано относительно привлечённых депозитов — индикатор ликвидности и зависимости от фондирования.',
   formula:'Кредиты / Депозиты',
   who:'Казначейство, риск, регулятор.',
   gotcha:'>100% = кредитов больше, чем депозитов → зависимость от рыночного фондирования (дороже и рискованнее).'},
  // ---- ПРИБЫЛЬНОСТЬ ----
  {id:'nim',term:'NIM — Net Interest Margin',block:'prof',
   meaning:'Чистая процентная маржа: разница между доходом по кредитам/картам и стоимостью фондирования.',
   formula:'(Процентный доход − Процентный расход) / Средние работающие активы',
   who:'Топ-менеджмент, борд, инвесторы — главный индикатор маржинальности.',
   gotcha:'Знаменатель — работающие (доходные) активы, не все. У карт NIM высокий, но его съедает cost of risk.'},
  {id:'nii',term:'NII — Net Interest Income',block:'prof',
   meaning:'Абсолютная сумма чистого процентного дохода (NIM — то же, но в % от активов).',
   formula:'Процентный доход − Процентный расход',
   who:'Finance/FP&A для P&L; верхняя строка прибыли банка.',
   gotcha:'Не путать с NIM: NII — деньги, NIM — процент.'},
  {id:'arpc',term:'ARPC — Average Revenue Per Card',block:'prof',
   meaning:'Сколько в среднем приносит одна активная карта.',
   formula:'(Проценты + Комиссии + Interchange) / Активные карты',
   who:'Продукт и Finance — монетизация портфеля.',
   gotcha:'Смысл только в паре с CPAC: ARPC > CPAC = карта в плюсе.'},
  {id:'inter',term:'Interchange',block:'prof',
   meaning:'Комиссия, которую банк-эмитент получает с каждой покупки по карте (её платит банк-эквайер продавца).',
   formula:'≈ % от суммы транзакции',
   who:'Продукт, Finance — часть дохода (входит в ARPC).',
   gotcha:'Для transactor’ов (гасят баланс полностью) interchange — основной доход, т.к. процентов они не платят.'},
  {id:'cti',term:'Cost-to-Income (efficiency ratio)',block:'prof',
   meaning:'Сколько операционных расходов уходит на единицу дохода. Ниже = лучше.',
   formula:'Операционные расходы (OPEX) / Операционный доход',
   who:'Менеджмент, инвесторы — эффективность.',
   gotcha:'У молодого банка высокий (инвестируют в рост); важна динамика, а не уровень.'},
  {id:'roe',term:'ROE / ROA',block:'prof',
   meaning:'Отдача на капитал (ROE) и на активы (ROA).',
   formula:'ROE = Чистая прибыль / Капитал;  ROA = Чистая прибыль / Активы',
   who:'Инвесторы, борд, регулятор.',
   gotcha:'ROE можно раздуть плечом (leverage); регулятор смотрит на капитал отдельно.'},
  {id:'pnl',term:'P&L банка (структура прибыли)',block:'prof',
   meaning:'Как складывается прибыль банка сверху вниз.',
   formula:'Проц. доход − Проц. расход = NII; − резервы (CoR); + комиссии; − OPEX = прибыль до налога',
   who:'Finance/FP&A, менеджмент.',
   gotcha:'Для Plata резервы (CoR) — крупнейший вычет после NII из-за необеспеченных карт.'},
  // ---- ЮНИТ-ЭКОНОМИКА ----
  {id:'cac',term:'CAC — Customer Acquisition Cost',block:'unit',
   meaning:'Сколько стоит привлечь одного клиента.',
   formula:'Затраты на привлечение / Число новых клиентов',
   who:'Маркетинг, продукт, Finance — эффективность роста.',
   gotcha:'Считать на активного клиента, не на регистрацию.'},
  {id:'ltv',term:'LTV / CLTV — Lifetime Value',block:'unit',
   meaning:'Суммарная прибыль с клиента за всё время отношений.',
   formula:'≈ (маржа на клиента за период × срок жизни) − затраты на обслуживание',
   who:'Продукт, Finance, инвесторы.',
   gotcha:'Здоровая планка LTV ≥ 3×CAC. Мультипродуктовые клиенты дают LTV выше.'},
  {id:'rev',term:'Revolver rate',block:'unit',
   meaning:'Доля клиентов, переносящих баланс на след. месяц (платят проценты), против тех, кто гасит полностью.',
   formula:'Клиенты с переносимым балансом / Все активные клиенты',
   who:'Продукт, Finance — револьверы дают процентный доход.',
   gotcha:'Слишком высокий revolver rate = доход, но и рост кредитного риска.'},
  {id:'cpac',term:'CPAC — Cost Per Active Card',block:'unit',
   meaning:'Все операционные затраты на одну активную карту (саппорт, фрод, кешбэк, IT).',
   formula:'Операционные затраты на карты / Активные карты',
   who:'Finance, продукт — здоровье юнит-экономики.',
   gotcha:'Ключевое сравнение — ARPC vs CPAC.'},
  {id:'act',term:'Approval & Activation rate',block:'unit',
   meaning:'Approval — доля одобренных заявок. Activation — доля одобренных, кто реально начал пользоваться картой.',
   formula:'Approval = одобрено / подано;  Activation = активировано / одобрено',
   who:'Продукт, риск, рост.',
   gotcha:'Высокий approval растит кредитный риск; низкая активация = слитый CAC.'},
  // ---- ДАННЫЕ И ОТЧЁТНОСТЬ ----
  {id:'rep3',term:'Три вида отчётности',block:'data',
   meaning:'Регуляторная (для CNBV, по закону), управленческая (для решений менеджмента), OPEX (контроль расходов по cost-центрам).',
   formula:'Одни данные → разные срезы и правила',
   who:'BA — ядро роли: автоматизировать все три.',
   gotcha:'Регуляторная — жёсткая и аудируемая; управленческая — гибкая/быстрая; OPEX — бюджетный контроль.'},
  {id:'sot',term:'Single source of truth',block:'data',
   meaning:'Одна согласованная витрина данных, чтобы у всех совпадали цифры по одному KPI.',
   formula:'— (принцип, не формула)',
   who:'BA, Finance, продукт — устраняет расхождения в отчётах.',
   gotcha:'Частая боль на интервью: у продукта и Finance разные числа → нет SoT.'},
  {id:'etl',term:'ETL / ELT',block:'data',
   meaning:'Пайплайн данных: Extract (извлечь) → Transform (преобразовать) → Load (загрузить) в DWH.',
   formula:'Extract → Transform → Load',
   who:'BA + дата-инженеры — автоматизация отчётности.',
   gotcha:'ELT = трансформация уже внутри хранилища (современный подход с облачным DWH).'},
  {id:'rec',term:'Reconciliation',block:'data',
   meaning:'Сверка итогов отчёта с источником/контрольной суммой, чтобы доверять цифрам.',
   formula:'Итог отчёта = Итог источника (GL)?',
   who:'BA, Finance — контроль качества данных, аудит.',
   gotcha:'Для регуляторной отчётности обязательна + data lineage (откуда взялась цифра).'},
  // ---- ПРОДУКТ ----
  {id:'dau',term:'DAU / MAU · Stickiness',block:'prod',
   meaning:'DAU — уникальные пользователи за день, MAU — за месяц. Stickiness = DAU/MAU показывает, как часто люди возвращаются.',
   formula:'Stickiness = DAU / MAU',
   who:'Продукт, рост.',
   gotcha:'Сначала определи, что такое «активный» (вход в приложение ≠ транзакция). 20%+ обычно считают неплохо.'},
  {id:'ret',term:'Retention / Churn',block:'prod',
   meaning:'Retention — доля клиентов, оставшихся активными через период. Churn — доля ушедших.',

   who:'Продукт, Finance (напрямую влияет на LTV).',
   gotcha:'Для карты churn = закрытие или неактивность; режет LTV. Удержать дешевле, чем привлечь (CAC).'},
  {id:'conv',term:'Conversion rate (воронка)',block:'prod',
   meaning:'Доля пользователей, прошедших на следующий шаг: заявка → одобрение → активация → первая транзакция.',
   formula:'Conversion = прошли шаг / вошли в шаг',
   who:'Продукт, рост, риск.',
   gotcha:'Смотреть по каждому шагу: узкое место воронки = где теряем деньги (CAC уже потрачен).'},
  {id:'arpu',term:'ARPU — Average Revenue Per User',block:'prod',
   meaning:'Средний доход на пользователя по всем продуктам (шире, чем ARPC, который только по картам).',
   formula:'Общий доход / Число активных пользователей',
   who:'Продукт, Finance, инвесторы.',
   gotcha:'Растёт за счёт кросс-продаж (карта + счёт + сбережения). Сравнивать с CAC.'},
  {id:'eng',term:'Engagement / частота транзакций',block:'prod',
   meaning:'Как часто и сколько клиент пользуется продуктом (число транзакций и объём за период).',
   formula:'Транзакции за период / Активные пользователи',
   who:'Продукт, Finance — драйвер interchange и процентного дохода.',
   gotcha:'Высокая частота = выше interchange; вовлечённость предсказывает удержание.'},
  {id:'nps',term:'NPS — Net Promoter Score',block:'prod',
   meaning:'Лояльность: насколько клиенты готовы рекомендовать продукт (опрос по шкале 0–10).',
   formula:'NPS = % промоутеров (9–10) − % критиков (0–6)',
   who:'Продукт, менеджмент.',
   gotcha:'Не финансовая метрика, но коррелирует с удержанием и снижает CAC (сарафанное радио).'},
];

/* ===================== ДАННЫЕ: кейсы «спроектируй отчёт» ===================== */
const CASES = [
  {title:'Кейс 1 · Автоматизировать ежемесячный OPEX-отчёт',
   scn:'Finance вручную собирает OPEX по cost-центрам из выгрузок ERP и 4 Excel-файлов — 2 дня в месяц, бывают ошибки. Нужно автоматизировать.',
   steps:[
     '<b>Заказчик/решение:</b> владельцы бюджетов и FP&A; цель — контроль план-факт по расходам.',
     '<b>Метрики:</b> расходы по cost-центру/категории, план-факт, отклонение %.',
     '<b>Источники:</b> ERP (SAP/Oracle) как основной; ручные Excel убрать → завести в DWH.',
     '<b>Логика:</b> маппинг счетов на категории, аллокация общих затрат, обработка late postings.',
     '<b>Валидация:</b> сверка итога с главной книгой (GL reconciliation).',
     '<b>Доставка/успех:</b> pipeline ERP→DWH→Power BI; с 2 дней до часов, 0 ручных правок. MVP — один срез, затем drill-down.']},
  {title:'Кейс 2 · Регуляторный отчёт для CNBV в срок',
   scn:'Данные для регуляторного отчёта приходят поздно, дедлайн регулятора горит, формат жёсткий.',
   steps:[
     '<b>Заказчик/решение:</b> регулятор (CNBV); цель — комплаенс, избежать штрафа → это must / приоритет.',
     '<b>Метрики:</b> по методологии регулятора (близко к IFRS); определения менять нельзя.',
     '<b>Источники:</b> портфель/резервы из DWH; критична своевременность.',
     '<b>Логика:</b> строго по регуляторной методологии, фиксированный формат, версионирование.',
     '<b>Валидация:</b> контрольные суммы, сверка с управленческой отчётностью, audit trail/lineage.',
     '<b>Доставка/успех:</b> автоматизированный pipeline с ранним cut-off данных и алертами; сдано в срок, проходит аудит.']},
  {title:'Кейс 3 · Единая витрина KPI (цифры расходятся)',
   scn:'У продукта и у Finance разные значения cost of risk и числа активных карт. Нужен единый дашборд KPI.',
   steps:[
     '<b>Заказчик/решение:</b> менеджмент; цель — одна правда для всех на борде.',
     '<b>Метрики:</b> согласовать определения (что такое «активная карта», период, знаменатель CoR).',
     '<b>Источники:</b> найти, что считают из разных таблиц/фильтров → причина расхождения.',
     '<b>Логика:</b> закрепить единые формулы в одной витрине.',
     '<b>Валидация:</b> обе стороны сверяют исторические цифры с новой витриной.',
     '<b>Доставка/успех:</b> single source of truth + BI; расхождения = 0, все пользуются одним.']},
  {title:'Кейс 4 · Новый продукт запустили — его нет в отчётности',
   scn:'Запустили Plata Ahorro (сбережения), в управленческой отчётности продукта нет.',
   steps:[
     '<b>Заказчик/решение:</b> Finance/менеджмент; цель — видеть вклад нового продукта в P&L.',
     '<b>Метрики:</b> применимые к сберегательному продукту (объём, стоимость фондирования, влияние на NIM) — отличаются от карты.',
     '<b>Источники:</b> новые таблицы по продукту; требования к данным собрать заранее.',
     '<b>Логика:</b> учесть продукт в P&L и в управленческих срезах.',
     '<b>Валидация:</b> сверка объёмов с операционной системой продукта.',
     '<b>Урок для интервью:</b> требования к отчётности собирать НА запуске продукта, не после. Предложить процесс «product launch → reporting checklist».']},
];

const FRAMEWORK = '<b>Каркас ответа (6 шагов):</b> 1) Заказчик и решение, которое отчёт поддерживает · 2) Метрики и единые определения · 3) Источники данных и качество · 4) Логика расчёта и edge cases · 5) Валидация/сверка · 6) Доставка (BI/автоматизация) + метрика успеха, MVP→итерации.';

const BLOCKMETA={risk:['b-risk','Риск'],prof:['b-prof','Прибыльность'],unit:['b-unit','Юнит-экономика'],data:['b-data','Данные'],prod:['b-prod','Продукт']};
const SESSION_LEN=10;

/* ===================== Состояние (localStorage, SRS Лейтнер) ===================== */
const KEY='plata_trainer_v2';
let state=load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.cards)return s;}catch(e){}
  const cards={};CARDS.forEach(c=>cards[c.id]={box:0,due:0});
  return {cards,streak:0,lastDay:null};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
// миграция: если добавились новые карты — завести их в состоянии
CARDS.forEach(c=>{if(!state.cards[c.id])state.cards[c.id]={box:0,due:0};});
const INTERVALS=[0,1,2,4,8,16];
function masteredCount(){return CARDS.filter(c=>(state.cards[c.id].box||0)>=4).length;}
function dueCards(){const now=Date.now();return CARDS.filter(c=>(state.cards[c.id].due||0)<=now);}
function rate(id,q){ // q: 0 again,1 hard,2 good,3 easy
  const c=state.cards[id];
  if(q===0)c.box=0; else if(q>=2)c.box=Math.min(5,(c.box||0)+1);
  const days=q===0?0:INTERVALS[c.box]||16;
  c.due=Date.now()+(q===0?60*1000:days*864e5);
  save();
}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function bumpStreak(){
  const t=todayStr();if(state.lastDay===t)return;
  const yd=new Date(Date.now()-864e5);const y=yd.getFullYear()+'-'+(yd.getMonth()+1)+'-'+yd.getDate();
  state.streak=(state.lastDay===y)?(state.streak||0)+1:1;
  state.lastDay=t;save();
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===================== UI ===================== */
let mode='learn';
const app=document.getElementById('app');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  mode=t.dataset.mode;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  render();
});
function refreshHeader(){
  document.getElementById('streak').textContent=state.streak||0;
  document.getElementById('mastered').textContent=masteredCount()+'/'+CARDS.length;
  document.getElementById('fill').style.width=(masteredCount()/CARDS.length*100)+'%';
}
function blockTag(b){const[m,l]=BLOCKMETA[b];return `<span class="blocktag ${m}">${l}</span>`;}
function render(){refreshHeader();if(mode==='learn')renderLearn();else if(mode==='quiz')renderQuiz();else renderCases();}

/* ---- Карточки: сессия с раскрытием + SRS ---- */
let learnS=null;
function renderLearn(){
  if(!learnS){
    const due=dueCards();
    if(!due.length){
      app.innerHTML=`<div class="done"><div class="big">🎉</div><h2>На сегодня всё</h2>
        <p>Все карточки повторены по интервалам.<br>Слабые всплывут снова позже.</p>
        <div class="scoreline"><div><div class="v">${masteredCount()}</div><div class="k">освоено</div></div>
        <div><div class="v">${CARDS.length}</div><div class="k">всего</div></div></div>
        <button class="btn btn-ghost" onclick="learnS={cards:window.__allShuffled(),i:0,again:0,good:0};render()">Повторить всё равно</button>
        <div><button class="reset" onclick="if(confirm('Сбросить весь прогресс?')){localStorage.removeItem(KEY);location.reload();}">сбросить прогресс</button></div></div>`;
      return;
    }
    learnS={cards:shuffle(due).slice(0,SESSION_LEN),i:0,again:0,good:0};
  }
  if(learnS.i>=learnS.cards.length){
    const total=learnS.cards.length;
    app.innerHTML=`<div class="done"><div class="big">${learnS.again===0?'🏆':'✅'}</div><h2>Сессия пройдена</h2>
      <div class="scoreline">
        <div><div class="v">${total}</div><div class="k">карт</div></div>
        <div><div class="v" style="color:var(--green)">${learnS.good}</div><div class="k">вспомнил</div></div>
        <div><div class="v" style="color:var(--red)">${learnS.again}</div><div class="k">повторить</div></div></div>
      <p>🔥 Стрик: ${state.streak} · ⭐ Освоено: ${masteredCount()}/${CARDS.length}</p>
      <button class="btn btn-green mt" onclick="learnS=null;render()">Новая сессия</button></div>`;
    learnS=null; // следующая сессия соберётся заново
    return;
  }
  const c=learnS.cards[learnS.i];
  app.innerHTML=`
    <div class="topline">${blockTag(c.block)}<span class="counter">${learnS.i+1} / ${learnS.cards.length}</span></div>
    <div class="panel">
      <div class="term">${c.term}</div>
      <div class="prompt">Вспомни три вещи: <b>что значит</b> · <b>как считается</b> · <b>кому нужна</b>.</div>
      <div id="ans" class="answer">
        <div class="row"><div class="lab">Что значит</div><div class="val">${c.meaning}</div></div>
        <div class="row"><div class="lab">Как считается</div><div class="val"><span class="formula">${c.formula}</span></div></div>
        <div class="row"><div class="lab">Кому нужна</div><div class="val">${c.who}</div></div>
        <div class="row gotcha"><div class="lab">⚠ Подвох на интервью</div><div class="val">${c.gotcha}</div></div>
      </div>
      <button id="showBtn" class="btn btn-green" onclick="window.__reveal()">Показать ответ</button>
      <div id="rate" class="rate" style="display:none">
        <button class="rbtn r-again" onclick="window.__ans(0)">Не знал<small>снова</small></button>
        <button class="rbtn r-hard" onclick="window.__ans(1)">Трудно<small>скоро</small></button>
        <button class="rbtn r-good" onclick="window.__ans(2)">Помню<small>+1</small></button>
        <button class="rbtn r-easy" onclick="window.__ans(3)">Легко<small>+1</small></button>
      </div>
    </div>`;
}
window.__allShuffled=()=>shuffle(CARDS);
window.__reveal=function(){
  document.getElementById('ans').classList.add('show');
  document.getElementById('showBtn').style.display='none';
  document.getElementById('rate').style.display='grid';
};
window.__ans=function(q){
  const c=learnS.cards[learnS.i];
  rate(c.id,q);bumpStreak();
  if(q===0)learnS.again++;else learnS.good++;
  learnS.i++;render();
};

/* ---- Квиз: сессия из 10 вопросов ---- */
let quizS=null;
const QLABEL={formula:'Как считается',meaning:'Что значит',who:'Кому нужна / зачем'};
function buildQuizSession(){
  const types=['formula','meaning','who'];
  const cards=shuffle(CARDS).slice(0,SESSION_LEN);
  const qs=cards.map(c=>({card:c,type:types[Math.floor(Math.random()*types.length)],answered:false}));
  return {qs,i:0,score:0};
}
function renderQuiz(){
  if(!quizS)quizS=buildQuizSession();
  if(quizS.i>=quizS.qs.length){
    const total=quizS.qs.length,sc=quizS.score;
    const pct=Math.round(sc/total*100);
    app.innerHTML=`<div class="done"><div class="big">${pct>=80?'🏆':pct>=50?'👍':'📚'}</div><h2>Квиз пройден</h2>
      <div class="scoreline"><div><div class="v" style="color:var(--green)">${sc}/${total}</div><div class="k">верно</div></div>
      <div><div class="v">${pct}%</div><div class="k">точность</div></div></div>
      <p>🔥 Стрик: ${state.streak} · ⭐ Освоено: ${masteredCount()}/${CARDS.length}</p>
      <button class="btn btn-green mt" onclick="quizS=null;render()">Ещё раунд</button></div>`;
    quizS=null;return;
  }
  const item=quizS.qs[quizS.i];const {card,type}=item;
  const correct=card[type];
  const others=shuffle(CARDS.filter(c=>c.id!==card.id&&c[type]&&c[type]!==correct)).slice(0,3).map(c=>c[type]);
  item.opts=item.opts||shuffle([correct,...others]);
  app.innerHTML=`
    <div class="topline">${blockTag(card.block)}<span class="counter">${quizS.i+1} / ${quizS.qs.length}</span></div>
    <div class="q">${QLABEL[type]}: <b>${card.term}</b>?</div>
    <div id="opts">${item.opts.map(o=>`<button class="opt" onclick="window.__pick(this)" data-c="${o===correct?1:0}">${o}</button>`).join('')}</div>
    <div id="fb"></div>`;
}
window.__pick=function(btn){
  const item=quizS.qs[quizS.i];if(item.answered)return;item.answered=true;
  const ok=btn.dataset.c==='1';
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;
    if(b.dataset.c==='1')b.classList.add('correct');else if(b===btn)b.classList.add('wrong');});
  const c=item.card;
  rate(c.id,ok?2:0);bumpStreak();if(ok)quizS.score++;refreshHeader();
  document.getElementById('fb').innerHTML=
    `<div class="feedback ${ok?'ok':'no'}">${ok?'✔ Верно':'✗ Не то — запомни:'}</div>
     <div class="explain"><b>${c.term}.</b> ${c.meaning}<br><br>
       <b>Формула:</b> ${c.formula}<br><b>Кому:</b> ${c.who}</div>
     <button class="btn btn-green" onclick="quizS.i++;render()">Дальше →</button>`;
};

/* ---- Кейсы: «спроектируй отчёт» (раскрытие разбора) ---- */
let caseOpen={};
function renderCases(){
  app.innerHTML=`<div class="casehint">${FRAMEWORK}</div>` + CASES.map((c,idx)=>`
    <div class="case">
      <h3>${c.title}</h3>
      <div class="scn">${c.scn}</div>
      <button class="btn ${caseOpen[idx]?'btn-ghost':'btn-green'}" onclick="window.__toggleCase(${idx})">
        ${caseOpen[idx]?'Скрыть разбор':'Сначала ответь сам · затем показать разбор'}</button>
      ${caseOpen[idx]?`<ol>${c.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`:''}
    </div>`).join('') + `<div class="smallnote">Проговори ответ вслух по 6 шагам, потом сверься. Это формат вопроса от Product Owner.</div>`;
}
window.__toggleCase=function(idx){caseOpen[idx]=!caseOpen[idx];renderCases();};

render();
</script>
</body>
</html>
